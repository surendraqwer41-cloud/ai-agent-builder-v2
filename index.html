<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Builder</title>

<style>
body{
background:#0b1633;
color:white;
font-family:Arial;
padding:20px;
}
textarea{
width:100%;
height:150px;
padding:10px;
}
button{
width:100%;
padding:15px;
margin-top:10px;
font-size:20px;
background:#22c55e;
color:white;
border:none;
border-radius:10px;
}
#result{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>AI Agent Builder</h1>

<textarea id="prompt" placeholder="Describe your app idea"></textarea>

<button onclick="generate()">Generate</button>

<div id="result">Result will appear here...</div>

<script>
async function generate() {

const idea = document.getElementById("prompt").value;

if(!idea){
alert("App idea likho");
return;
}

document.getElementById("result").innerText="Generating...";

try {

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=YOUR_API_KEY",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:"Create an app plan for: " + idea
}
]
}
]
})
}
);

const data = await response.json();

document.getElementById("result").innerText =
data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

} catch(error){
document.getElementById("result").innerText =
"Error: " + error.message;
}

}
</script>

</body>
</html>
